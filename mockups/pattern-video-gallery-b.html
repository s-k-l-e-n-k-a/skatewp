<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skate — Video Gallery B: Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-heading: 'Syne', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --dark:   #080f16;
  --mid:    #0e1a24;
  --accent: #d6b36d;
  --white:  #ffffff;
  --muted:  rgba(255,255,255,.40);
  --border: rgba(255,255,255,.06);
}

body { font-family: var(--font-body); background: #F2F2F0; margin: 0; }
.stub { background: #F2F2F0; height: 80px; }

/* ── Section ── */
.vg {
  background: var(--dark);
  padding: clamp(3rem, 6vw, 5rem) clamp(1.5rem, 5vw, 4rem);
}

/* ── Top bar ── */
.vg__topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1.5rem;
  margin-bottom: clamp(2rem, 3.5vw, 3rem);
  flex-wrap: wrap;
}

.vg__heading {
  font-family: var(--font-heading);
  font-size: clamp(22px, 2.5vw, 32px);
  font-weight: 800;
  color: var(--white);
  letter-spacing: -.02em;
}

.vg__heading span { color: var(--accent); }

.vg__right {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-shrink: 0;
}

/* search */
.vg__search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 8px 16px;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: text;
  transition: border-color .2s;
}
.vg__search:hover { border-color: rgba(255,255,255,.18); }
.vg__search svg { width: 14px; height: 14px; flex-shrink: 0; }

/* filter pills */
.vg__filters { display: flex; gap: .4rem; }
.vg__filter {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 16px;
  border-radius: 100px;
  cursor: pointer;
  transition: background .2s, border-color .2s, color .2s;
  white-space: nowrap;
}
.vg__filter:hover  { color: var(--white); border-color: rgba(255,255,255,.2); }
.vg__filter.is-active {
  background: var(--accent); border-color: var(--accent);
  color: var(--dark); font-weight: 700;
}

/* ── Hero card ── */
.vg__hero {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  aspect-ratio: 21 / 9;
  margin-bottom: 16px;
  cursor: pointer;
  background: #0a131c;
}

@media (max-width: 768px) { .vg__hero { aspect-ratio: 16 / 9; } }

.vg__hero-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .6s ease, filter .6s ease;
  filter: brightness(.6);
}
.vg__hero:hover .vg__hero-img { transform: scale(1.03); filter: brightness(.45); }

/* gradient */
.vg__hero::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(8,15,22,.95) 0%, rgba(8,15,22,.3) 45%, transparent 70%);
  pointer-events: none;
}

.vg__hero-content {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: clamp(1.5rem, 3vw, 2.5rem);
  z-index: 2;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1.5rem;
}

.vg__hero-meta {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: .75rem;
}

.vg__hero-cat {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--dark);
  background: var(--accent);
  padding: 3px 11px;
  border-radius: 100px;
}

.vg__hero-dur {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
}

.vg__hero-title {
  font-family: var(--font-heading);
  font-size: clamp(22px, 2.8vw, 36px);
  font-weight: 700;
  color: var(--white);
  line-height: 1.15;
  max-width: 580px;
}

/* play button hero */
.vg__hero-play {
  flex-shrink: 0;
  width: 64px; height: 64px;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(255,255,255,.3);
  display: flex; align-items: center; justify-content: center;
  transition: background .25s, transform .25s, border-color .25s;
}
.vg__hero:hover .vg__hero-play {
  background: var(--accent); border-color: var(--accent); transform: scale(1.1);
}
.vg__hero-play-icon {
  width: 0; height: 0;
  border-style: solid;
  border-width: 11px 0 11px 20px;
  border-color: transparent transparent transparent #fff;
  margin-left: 4px;
}
.vg__hero:hover .vg__hero-play-icon { border-left-color: var(--dark); }

/* "NEW" badge */
.vg__hero-badge {
  position: absolute;
  top: 18px; left: 18px;
  z-index: 3;
  background: var(--accent);
  color: var(--dark);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .16em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
}

/* ── Grid ── */
.vg__grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

@media (max-width: 900px) { .vg__grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .vg__grid { grid-template-columns: 1fr; } }

/* ── Card ── */
.vc {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  background: var(--mid);
}

.vc__thumb {
  aspect-ratio: 16 / 9;
  overflow: hidden;
  position: relative;
}

.vc__img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .4s ease, filter .4s ease;
  filter: brightness(.8);
}
.vc:hover .vc__img { transform: scale(1.07); filter: brightness(.4); }

/* overlay that slides up on hover */
.vc__overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 14px;
  background: linear-gradient(to top, rgba(8,15,22,.9) 0%, transparent 60%);
  transition: background .3s;
}
.vc:hover .vc__overlay {
  background: linear-gradient(to top, rgba(8,15,22,.96) 0%, rgba(8,15,22,.6) 60%, transparent 100%);
}

.vc__info {
  transform: translateY(6px);
  transition: transform .3s ease;
}
.vc:hover .vc__info { transform: translateY(0); }

.vc__cat {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
  opacity: 0;
  transition: opacity .25s .05s;
}
.vc:hover .vc__cat { opacity: 1; }

.vc__title {
  font-family: var(--font-heading);
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.3;
}

.vc__dur {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 5px;
}

/* play on hover center */
.vc__play {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity .25s;
  pointer-events: none;
}
.vc:hover .vc__play { opacity: 1; }

.vc__play-circle {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,.15);
  backdrop-filter: blur(6px);
  border: 1.5px solid rgba(255,255,255,.4);
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.vc:hover .vc__play-circle { background: var(--accent); border-color: var(--accent); }

.vc__play-icon {
  width: 0; height: 0;
  border-style: solid;
  border-width: 7px 0 7px 13px;
  border-color: transparent transparent transparent #fff;
  margin-left: 2px;
}
</style>
</head>
<body>

<div class="stub"></div>

<section class="vg">

  <!-- Top bar -->
  <div class="vg__topbar">
    <h2 class="vg__heading">Film <span>Archive</span></h2>
    <div class="vg__right">
      <div class="vg__search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search films…
      </div>
      <div class="vg__filters">
        <button class="vg__filter is-active">All</button>
        <button class="vg__filter">Doc</button>
        <button class="vg__filter">Brand</button>
        <button class="vg__filter">Events</button>
        <button class="vg__filter">Short</button>
      </div>
    </div>
  </div>

  <!-- Hero -->
  <div class="vg__hero">
    <img class="vg__hero-img" src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=1400&q=80" alt="">
    <span class="vg__hero-badge">New</span>
    <div class="vg__hero-content">
      <div>
        <div class="vg__hero-meta">
          <span class="vg__hero-cat">Documentary</span>
          <span class="vg__hero-dur">24:07</span>
        </div>
        <h2 class="vg__hero-title">Across Nations — A Story of Film Without Borders</h2>
      </div>
      <div class="vg__hero-play">
        <div class="vg__hero-play-icon"></div>
      </div>
    </div>
  </div>

  <!-- Grid -->
  <div class="vg__grid">

    <div class="vc">
      <div class="vc__thumb">
        <img class="vc__img" src="https://images.unsplash.com/photo-1598387993441-a364f854c3e1?w=600&q=80" alt="">
        <span class="vc__dur">3:42</span>
        <div class="vc__play"><div class="vc__play-circle"><div class="vc__play-icon"></div></div></div>
        <div class="vc__overlay">
          <div class="vc__info">
            <p class="vc__cat">Brand</p>
            <p class="vc__title">Heimwerk — Brand Identity Film</p>
          </div>
        </div>
      </div>
    </div>

    <div class="vc">
      <div class="vc__thumb">
        <img class="vc__img" src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=600&q=80" alt="">
        <span class="vc__dur">11:18</span>
        <div class="vc__play"><div class="vc__play-circle"><div class="vc__play-icon"></div></div></div>
        <div class="vc__overlay">
          <div class="vc__info">
            <p class="vc__cat">Short Film</p>
            <p class="vc__title">Still Water</p>
          </div>
        </div>
      </div>
    </div>

    <div class="vc">
      <div class="vc__thumb">
        <img class="vc__img" src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=600&q=80" alt="">
        <span class="vc__dur">5:55</span>
        <div class="vc__play"><div class="vc__play-circle"><div class="vc__play-icon"></div></div></div>
        <div class="vc__overlay">
          <div class="vc__info">
            <p class="vc__cat">Events</p>
            <p class="vc__title">Summit Aftermovie — Berlin 2025</p>
          </div>
        </div>
      </div>
    </div>

    <div class="vc">
      <div class="vc__thumb">
        <img class="vc__img" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=600&q=80" alt="">
        <span class="vc__dur">38:14</span>
        <div class="vc__play"><div class="vc__play-circle"><div class="vc__play-icon"></div></div></div>
        <div class="vc__overlay">
          <div class="vc__info">
            <p class="vc__cat">Documentary</p>
            <p class="vc__title">The Last Projection Room</p>
          </div>
        </div>
      </div>
    </div>

  </div>

</section>

<div class="stub"></div>

<script>
  document.querySelectorAll('.vg__filter').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.vg__filter').forEach(function(b) { b.classList.remove('is-active'); });
      btn.classList.add('is-active');
    });
  });
</script>
</body>
</html>

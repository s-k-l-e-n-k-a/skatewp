<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skate — Hero Fullscreen Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
  *, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font-heading: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --size-s: 13px;
    --size-m: 16px;
    --size-l: clamp(24px, 3vw, 32px);
    --size-xl: clamp(38px, 5vw, 58px);
  }

  body {
    font-family: var(--font-body);
    font-size: var(--size-m);
    background: #0f0f0f;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero__bg {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1544966503-7cc5ac882d5f?w=1600&q=80');
    background-size: cover;
    background-position: center;
  }

  .hero__overlay {
    position: absolute;
    inset: 0;
    background: #17263A;
    opacity: 0.6;
  }

  .hero__inner {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 4rem 2rem;
    max-width: 860px;
    width: 100%;
  }

  .hero__h1 {
    font-family: var(--font-heading);
    font-size: var(--size-xl);
    font-weight: 700;
    line-height: 1.1;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 1.25rem;
  }

  .hero__h2 {
    font-family: var(--font-body);
    font-size: var(--size-l);
    font-weight: 400;
    line-height: 1.4;
    color: rgba(255,255,255,0.8);
    margin-bottom: 2.5rem;
  }

  .hero__btn {
    display: inline-block;
    background: #d6b36d;
    color: #17263A;
    font-weight: 600;
    font-size: 1rem;
    padding: 0.85rem 2.25rem;
    border-radius: 4px;
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: opacity 0.2s;
  }

  .hero__btn:hover { opacity: 0.85; }

  /* ── Fake navbar for context ── */
  .navbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 1.25rem 3rem;
  }

  .navbar__logo {
    font-family: var(--font-heading);
    font-size: 1.25rem;
    font-weight: 700;
    font-style: italic;
    color: #fff;
    letter-spacing: 0.05em;
    justify-self: start;
  }

  .navbar__links {
    display: flex;
    gap: 2rem;
    list-style: none;
    justify-self: center;
  }

  .navbar__links a {
    font-family: var(--font-body);
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: var(--size-m);
    font-weight: 500;
  }

  .navbar__links a:hover { color: #d6b36d; }

  .navbar__actions {
    display: flex;
    gap: 0.75rem;
    justify-self: end;
    align-items: center;
  }

  .navbar__cta {
    background: #d6b36d;
    color: #17263A;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: var(--size-m);
    padding: 0.55rem 1.4rem;
    border-radius: 4px;
    text-decoration: none;
  }

  /* ── Scroll hint ── */
  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .scroll-hint__line {
    width: 1px;
    height: 40px;
    background: rgba(255,255,255,0.3);
    animation: scrollDown 1.6s ease-in-out infinite;
  }

  @keyframes scrollDown {
    0%   { transform: scaleY(0); transform-origin: top; }
    50%  { transform: scaleY(1); transform-origin: top; }
    51%  { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero__bg"></div>
  <div class="hero__overlay"></div>

  <nav class="navbar">
    <span class="navbar__logo">SKATE</span>
    <ul class="navbar__links">
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Work</a></li>
    </ul>
    <div class="navbar__actions">
      <a href="#" class="navbar__cta">Contact</a>
    </div>
  </nav>

  <div class="hero__inner">
    <h1 class="hero__h1">Your Headline Here</h1>
    <p class="hero__h2">A short subtitle that supports your main message and gives context to the visitor.</p>
    <a href="#" class="hero__btn">Get Started</a>
  </div>

  <div class="scroll-hint">
    <div class="scroll-hint__line"></div>
    <span>Scroll</span>
  </div>
</section>

</body>
</html>
